<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentalis</title>
<link rel="preconnect" href="https://fonts.googleapis.cn">
<link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin>
<link href="https://fonts.googleapis.cn/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0b0f;
    background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(88, 60, 180, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(60, 100, 180, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(120, 60, 160, 0.05) 0%, transparent 50%);
    color: white;
    font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.container {
    width: 420px;
    max-width: 95%;
    height: 720px;
    max-height: 95vh;
    background: linear-gradient(180deg, #16181f 0%, #12141a 100%);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 
        0 0 0 1px rgba(255, 255, 255, 0.04),
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 80px rgba(100, 60, 180, 0.06);
}

/* Header */
.header {
    text-align: center;
    padding: 20px 18px 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    flex-shrink: 0;
    position: relative;
}

.header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(140, 100, 220, 0.3), transparent);
}

.header-title {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, #c8b6ff 0%, #8dd2ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.header-subtitle {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.35);
    margin-top: 4px;
    font-weight: 400;
}

/* Chat Area */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    scroll-behavior: smooth;
}

.chat::-webkit-scrollbar {
    width: 3px;
}

.chat::-webkit-scrollbar-track {
    background: transparent;
}

.chat::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
}

.chat::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2);
}

/* Messages */
.message-wrapper {
    display: flex;
    margin-bottom: 16px;
    animation: slideUp 0.3s ease;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

.message-wrapper.user {
    justify-content: flex-end;
}

.message-wrapper.ai {
    justify-content: flex-start;
}

.avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
}

.ai .avatar {
    background: linear-gradient(135deg, rgba(140, 100, 220, 0.2), rgba(100, 160, 220, 0.2));
    border: 1px solid rgba(140, 100, 220, 0.3);
    margin-right: 10px;
}

.user .avatar {
    background: linear-gradient(135deg, rgba(60, 130, 246, 0.2), rgba(100, 180, 246, 0.2));
    border: 1px solid rgba(60, 130, 246, 0.3);
    margin-left: 10px;
    order: 2;
}

.message-bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 18px;
    line-height: 1.6;
    font-size: 14px;
    word-wrap: break-word;
}

.ai .message-bubble {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-top-left-radius: 4px;
    color: rgba(255, 255, 255, 0.9);
}

.user .message-bubble {
    background: linear-gradient(135deg, rgba(60, 130, 246, 0.25), rgba(80, 100, 220, 0.2));
    border: 1px solid rgba(60, 130, 246, 0.2);
    border-top-right-radius: 4px;
    color: rgba(255, 255, 255, 0.95);
}

/* Typing Indicator */
.typing {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
}

.typing span {
    width: 6px;
    height: 6px;
    background: rgba(140, 100, 220, 0.6);
    border-radius: 50%;
    animation: bounce 0.6s infinite alternate;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
    to { opacity: 0.3; transform: translateY(-4px); }
}

/* Input Area */
.bottom {
    display: flex;
    padding: 16px;
    gap: 10px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    flex-shrink: 0;
    background: rgba(0, 0, 0, 0.2);
}

input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    outline: none;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.04);
    color: white;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.2s ease;
}

input:focus {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(140, 100, 220, 0.3);
    box-shadow: 0 0 0 3px rgba(140, 100, 220, 0.08);
}

input::placeholder {
    color: rgba(255, 255, 255, 0.3);
}

button {
    padding: 0 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #6c5ce7, #5b7cfa);
    color: white;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    transition: all 0.2s ease;
    box-shadow: 0 2px 8px rgba(108, 92, 231, 0.2);
}

button:hover {
    background: linear-gradient(135deg, #7c6cf7, #6b8cff);
    box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
    transform: translateY(-1px);
}

button:active {
    transform: translateY(0);
    box-shadow: 0 2px 6px rgba(108, 92, 231, 0.2);
}

button:disabled {
    background: rgba(255, 255, 255, 0.06);
    color: rgba(255, 255, 255, 0.3);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
}

/* Welcome message */
.welcome {
    text-align: center;
    padding: 40px 20px;
    color: rgba(255, 255, 255, 0.4);
    font-size: 14px;
    line-height: 1.8;
}

.welcome-icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.6;
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-title">Mentalis</div>
        <div class="header-subtitle">你的情绪陪伴空间</div>
    </div>
    
    <div class="chat" id="chat">
        <div class="welcome">
            <div class="welcome-icon">🌙</div>
            <div>在这里，你可以安心说出口<br>任何想说的话</div>
        </div>
    </div>
    
    <div class="bottom">
        <input id="input" placeholder="说说你的感受..." autocomplete="off" />
        <button id="sendBtn" onclick="send()">发送</button>
    </div>
</div>

<script>
const API_KEY = "ark-21fe56bc-722b-41c8-9274-d5de896c2460-928de";

const chatEl  = document.getElementById("chat");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

let isFirstMessage = true;

function addMessage(text, type) {
    // Remove welcome message on first interaction
    if (isFirstMessage) {
        const welcome = chatEl.querySelector('.welcome');
        if (welcome) welcome.remove();
        isFirstMessage = false;
    }

    const wrapper = document.createElement("div");
    wrapper.className = "message-wrapper " + type;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = type === "ai" ? "🌙" : "🌟";

    const bubble = document.createElement("div");
    bubble.className = "message-bubble";
    bubble.textContent = text;

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    chatEl.appendChild(wrapper);
    chatEl.scrollTop = chatEl.scrollHeight;
    return wrapper;
}

function showTyping() {
    if (isFirstMessage) {
        const welcome = chatEl.querySelector('.welcome');
        if (welcome) welcome.remove();
        isFirstMessage = false;
    }

    const wrapper = document.createElement("div");
    wrapper.className = "message-wrapper ai";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "🌙";

    const bubble = document.createElement("div");
    bubble.className = "message-bubble";
    bubble.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    chatEl.appendChild(wrapper);
    chatEl.scrollTop = chatEl.scrollHeight;
    return wrapper;
}

async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    addMessage(text, "user");
    inputEl.value = "";

    sendBtn.disabled = true;
    const typingEl = showTyping();

    try {
        const reply = await callAI(text);
        typingEl.remove();
        addMessage(reply, "ai");
    } catch (e) {
        typingEl.remove();
        addMessage("抱歉，出了点问题：" + e.message, "ai");
    }

    sendBtn.disabled = false;
    inputEl.focus();
}

async function callAI(text) {
    const res = await fetch(
        "https://ark.cn-beijing.volces.com/api/v3/chat/completions",
        {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + API_KEY,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "ep-20260706093059-28svb",
                messages: [
                    {
                        role: "system",
                        content:
                            "你叫 Mentalis。\n" +
                            "你是一位温柔的情绪陪伴AI。\n" +
                            "要求：\n" +
                            "不要说教。\n" +
                            "不要分析用户。\n" +
                            "不要长篇大论。\n" +
                            "先共情，再轻轻追问。\n" +
                            "每次回复控制在60字以内。"
                    },
                    {
                        role: "user",
                        content: text
                    }
                ],
                temperature: 0.9,
                max_tokens: 200
            })
        }
    );

    const data = await res.json();

    if (!res.ok) {
        throw new Error(data.error?.message || JSON.stringify(data));
    }

    if (!data.choices) {
        return "模型没有返回内容。";
    }

    return data.choices[0].message.content;
}

inputEl.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !sendBtn.disabled) {
        send();
    }
});
</script>

</body>
</html>
