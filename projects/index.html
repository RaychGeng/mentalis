<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindRealm</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0f1115;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.container {
    width: 420px;
    max-width: 95%;
    height: 700px;
    max-height: 95vh;
    background: #181b22;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0, 0, 0, .4);
}

.header {
    text-align: center;
    padding: 18px;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    scroll-behavior: smooth;
}

.chat::-webkit-scrollbar {
    width: 4px;
}

.chat::-webkit-scrollbar-track {
    background: transparent;
}

.chat::-webkit-scrollbar-thumb {
    background: #333;
    border-radius: 2px;
}

.message {
    margin-bottom: 15px;
    line-height: 1.7;
    font-size: 15px;
    animation: fadeIn .3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
}

.user {
    text-align: right;
    color: #ffffff;
}

.ai {
    color: #8dd2ff;
}

.typing {
    display: inline-flex;
    gap: 4px;
    align-items: center;
}

.typing span {
    width: 6px;
    height: 6px;
    background: #8dd2ff;
    border-radius: 50%;
    animation: bounce .6s infinite alternate;
}

.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }

@keyframes bounce {
    to { opacity: .3; transform: translateY(-4px); }
}

.bottom {
    display: flex;
    padding: 15px;
    gap: 10px;
    border-top: 1px solid #333;
    flex-shrink: 0;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
    border-radius: 10px;
    background: #252a33;
    color: white;
    font-size: 14px;
    transition: background .2s;
}

input:focus {
    background: #2c313d;
}

input::placeholder {
    color: #666;
}

button {
    padding: 0 20px;
    border: none;
    border-radius: 10px;
    background: #2f7cf6;
    color: white;
    cursor: pointer;
    font-size: 14px;
    transition: background .2s;
}

button:hover {
    background: #3b87ff;
}

button:active {
    background: #2568d4;
}

button:disabled {
    background: #1e3a5f;
    cursor: not-allowed;
}
</style>
</head>
<body>

<div class="container">
    <div class="header">MindRealm</div>
    <div class="chat" id="chat"></div>
    <div class="bottom">
        <input id="input" placeholder="说说你的感受..." autocomplete="off" />
        <button id="sendBtn" onclick="send()">发送</button>
    </div>
</div>

<script>
const API_KEY = "YOUR_HF_TOKEN";

const chatEl  = document.getElementById("chat");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
}

function showTyping() {
    const div = document.createElement("div");
    div.className = "message ai";
    div.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
}

async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    addMessage("你：" + text, "user");
    inputEl.value = "";

    sendBtn.disabled = true;
    const typingEl = showTyping();

    try {
        const reply = await callAI(text);
        typingEl.remove();
        addMessage("AI：" + reply, "ai");
    } catch (e) {
        typingEl.remove();
        addMessage("AI：出错了 - " + e.message, "ai");
    }

    sendBtn.disabled = false;
    inputEl.focus();
}

async function callAI(text) {
    const res = await fetch(
        "https://router.huggingface.co/v1/chat/completions",
        {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + API_KEY,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "google/gemma-2-9b-it",
                messages: [
                    {
                        role: "system",
                        content:
                            "你叫 MindRealm。\n" +
                            "你是一位温柔的情绪陪伴AI。\n" +
                            "要求：\n" +
                            "不要说教。\n" +
                            "不要分析用户。\n" +
                            "不要长篇大论。\n" +
                            "先共情，再轻轻追问。\n" +
                            "每次回复控制在60字以内。"
                    },
                    {
                        role: "user",
                        content: text
                    }
                ],
                temperature: 0.9,
                max_tokens: 200
            })
        }
    );

    const data = await res.json();

    if (!res.ok) {
        throw new Error(data.error?.message || JSON.stringify(data));
    }

    if (!data.choices) {
        return "模型没有返回内容。";
    }

    return data.choices[0].message.content;
}

inputEl.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !sendBtn.disabled) {
        send();
    }
});
</script>

</body>
</html>
